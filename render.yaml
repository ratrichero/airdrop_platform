services:
  - type: web
    name: airdrop-platform
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm install
      npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false